name: Test Existing Examples

# Runs all examples on a schedule to catch regressions from SDK updates,
# API changes, or broken dependencies — independent of any PR activity.

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you triggering this manually?'
        required: false
        default: 'manual test'

concurrency:
  group: test-existing
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  workflows: write

jobs:
  # ── Node.js ────────────────────────────────────────────────────────────────
  node:
    runs-on: ubuntu-latest
    outputs:
      has_failures: ${{ steps.test.outputs.has_failures }}
      failed_examples: ${{ steps.test.outputs.failed_examples }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test Node.js examples
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          VONAGE_APPLICATION_ID: ${{ secrets.VONAGE_APPLICATION_ID }}
          VONAGE_PRIVATE_KEY: ${{ secrets.VONAGE_PRIVATE_KEY }}
          DAILY_API_KEY: ${{ secrets.DAILY_API_KEY }}
        run: |
          FAILED=""
          for dir in examples/*/; do
            [ ! -f "${dir}package.json" ] && continue
            echo "Testing: $dir"
            pushd "$dir" > /dev/null

            if [ -f ".env.example" ]; then
              MISSING=""
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR_NAME="${line%%=*}"; VAR_NAME="${VAR_NAME// /}"
                [ -z "$VAR_NAME" ] && continue
                [ -z "${!VAR_NAME+x}" ] || [ -z "${!VAR_NAME}" ] && MISSING="$MISSING $VAR_NAME"
              done < ".env.example"
              if [ -n "$MISSING" ]; then
                echo "⚠ Skipping $dir — missing secrets: $MISSING"
                popd > /dev/null; continue
              fi
            fi

            if [ -f "package-lock.json" ]; then npm ci --prefer-offline 2>&1; else npm install 2>&1; fi
            npm test 2>&1 || FAILED="$FAILED $dir"
            popd > /dev/null
          done

          [ -n "$FAILED" ] && echo "has_failures=true" >> $GITHUB_OUTPUT \
                           || echo "has_failures=false" >> $GITHUB_OUTPUT
          echo "failed_examples=${FAILED}" >> $GITHUB_OUTPUT

  # ── Python ─────────────────────────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    outputs:
      has_failures: ${{ steps.test.outputs.has_failures }}
      failed_examples: ${{ steps.test.outputs.failed_examples }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test Python examples
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          VONAGE_APPLICATION_ID: ${{ secrets.VONAGE_APPLICATION_ID }}
          VONAGE_PRIVATE_KEY: ${{ secrets.VONAGE_PRIVATE_KEY }}
          DAILY_API_KEY: ${{ secrets.DAILY_API_KEY }}
        run: |
          FAILED=""
          for dir in examples/*/; do
            HAS_PY=false
            [ -f "${dir}requirements.txt" ] && HAS_PY=true
            [ -f "${dir}pyproject.toml" ]   && HAS_PY=true
            [ "$HAS_PY" = "false" ] && continue
            echo "Testing: $dir"
            pushd "$dir" > /dev/null

            if [ -f ".env.example" ]; then
              MISSING=""
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR_NAME="${line%%=*}"; VAR_NAME="${VAR_NAME// /}"
                [ -z "$VAR_NAME" ] && continue
                [ -z "${!VAR_NAME+x}" ] || [ -z "${!VAR_NAME}" ] && MISSING="$MISSING $VAR_NAME"
              done < ".env.example"
              if [ -n "$MISSING" ]; then
                echo "⚠ Skipping $dir — missing secrets: $MISSING"
                popd > /dev/null; continue
              fi
            fi

            python -m pip install -q --upgrade pip
            [ -f "requirements.txt" ] && pip install -q -r requirements.txt
            [ -f "pyproject.toml" ]   && pip install -q -e .

            TEST_RAN=false
            if find tests/ -name "test_*.py" 2>/dev/null | grep -q .; then
              pip install -q pytest
              python -m pytest tests/ -v 2>&1 && TEST_RAN=true || { FAILED="$FAILED $dir"; TEST_RAN=true; }
            fi
            if [ "$TEST_RAN" = "false" ] && ls tests/*.py 2>/dev/null | head -1 | grep -q .; then
              python "$(ls tests/*.py | head -1)" 2>&1 || FAILED="$FAILED $dir"
            fi
            popd > /dev/null
          done

          [ -n "$FAILED" ] && echo "has_failures=true" >> $GITHUB_OUTPUT \
                           || echo "has_failures=false" >> $GITHUB_OUTPUT
          echo "failed_examples=${FAILED}" >> $GITHUB_OUTPUT

  # ── Go ─────────────────────────────────────────────────────────────────────
  go:
    runs-on: ubuntu-latest
    outputs:
      has_failures: ${{ steps.test.outputs.has_failures }}
      failed_examples: ${{ steps.test.outputs.failed_examples }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test Go examples
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          VONAGE_APPLICATION_ID: ${{ secrets.VONAGE_APPLICATION_ID }}
          VONAGE_PRIVATE_KEY: ${{ secrets.VONAGE_PRIVATE_KEY }}
          DAILY_API_KEY: ${{ secrets.DAILY_API_KEY }}
        run: |
          FAILED=""
          for dir in examples/*/; do
            [ ! -f "${dir}go.mod" ] && continue
            echo "Testing: $dir"
            pushd "$dir" > /dev/null

            if [ -f ".env.example" ]; then
              MISSING=""
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR_NAME="${line%%=*}"; VAR_NAME="${VAR_NAME// /}"
                [ -z "$VAR_NAME" ] && continue
                [ -z "${!VAR_NAME+x}" ] || [ -z "${!VAR_NAME}" ] && MISSING="$MISSING $VAR_NAME"
              done < ".env.example"
              if [ -n "$MISSING" ]; then
                echo "⚠ Skipping $dir — missing secrets: $MISSING"
                popd > /dev/null; continue
              fi
            fi

            go mod download
            go test ./... -v -timeout 60s 2>&1 || FAILED="$FAILED $dir"
            popd > /dev/null
          done

          [ -n "$FAILED" ] && echo "has_failures=true" >> $GITHUB_OUTPUT \
                           || echo "has_failures=false" >> $GITHUB_OUTPUT
          echo "failed_examples=${FAILED}" >> $GITHUB_OUTPUT

  # ── Java ───────────────────────────────────────────────────────────────────
  java:
    runs-on: ubuntu-latest
    outputs:
      has_failures: ${{ steps.test.outputs.has_failures }}
      failed_examples: ${{ steps.test.outputs.failed_examples }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Test Java examples
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          VONAGE_APPLICATION_ID: ${{ secrets.VONAGE_APPLICATION_ID }}
          VONAGE_PRIVATE_KEY: ${{ secrets.VONAGE_PRIVATE_KEY }}
          DAILY_API_KEY: ${{ secrets.DAILY_API_KEY }}
        run: |
          FAILED=""
          for dir in examples/*/; do
            HAS_JAVA=false
            [ -f "${dir}pom.xml" ]         && HAS_JAVA=true
            [ -f "${dir}build.gradle" ]     && HAS_JAVA=true
            [ "$HAS_JAVA" = "false" ] && continue
            echo "Testing: $dir"
            pushd "$dir" > /dev/null
            if [ -f ".env.example" ]; then
              MISSING=""
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR_NAME="${line%%=*}"; VAR_NAME="${VAR_NAME// /}"
                [ -z "$VAR_NAME" ] && continue
                [ -z "${!VAR_NAME+x}" ] || [ -z "${!VAR_NAME}" ] && MISSING="$MISSING $VAR_NAME"
              done < ".env.example"
              if [ -n "$MISSING" ]; then
                echo "⚠ Skipping $dir — missing secrets: $MISSING"
                popd > /dev/null; continue
              fi
            fi
            if [ -f "pom.xml" ]; then
              mvn test -q 2>&1 || FAILED="$FAILED $dir"
            else
              ./gradlew test 2>&1 || FAILED="$FAILED $dir"
            fi
            popd > /dev/null
          done
          [ -n "$FAILED" ] && echo "has_failures=true" >> $GITHUB_OUTPUT \
                           || echo "has_failures=false" >> $GITHUB_OUTPUT
          echo "failed_examples=${FAILED}" >> $GITHUB_OUTPUT

  # ── Report failures + fix ───────────────────────────────────────────────────
  report:
    needs: [node, python, go, java]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "examples-bot"
          git config user.email "noreply@deepgram.com"

      - name: Get date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Collect failures
        id: collect
        run: |
          ALL_FAILED=""
          [ "${{ needs.node.outputs.has_failures }}" = "true" ] && \
            ALL_FAILED="$ALL_FAILED Node:[${{ needs.node.outputs.failed_examples }}]"
          [ "${{ needs.python.outputs.has_failures }}" = "true" ] && \
            ALL_FAILED="$ALL_FAILED Python:[${{ needs.python.outputs.failed_examples }}]"
          [ "${{ needs.go.outputs.has_failures }}" = "true" ] && \
            ALL_FAILED="$ALL_FAILED Go:[${{ needs.go.outputs.failed_examples }}]"
          [ "${{ needs.java.outputs.has_failures }}" = "true" ] && \
            ALL_FAILED="$ALL_FAILED Java:[${{ needs.java.outputs.failed_examples }}]"

          [ -n "$ALL_FAILED" ] && echo "has_failures=true" >> $GITHUB_OUTPUT \
                               || echo "has_failures=false" >> $GITHUB_OUTPUT
          echo "all_failed=${ALL_FAILED}" >> $GITHUB_OUTPUT

      - name: Open tracking issue
        if: steps.collect.outputs.has_failures == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=${{ steps.date.outputs.date }}
          EXISTING=$(gh issue list --repo ${{ github.repository }} \
            --label "queue:fix-example" --state open \
            --search "Scheduled test failures ${TODAY}" \
            --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "Failure issue #$EXISTING already open — skipping"
            exit 0
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Scheduled test failures — ${TODAY}" \
            --label "queue:fix-example" \
            --label "type:fix" \
            --body "Scheduled test failures on ${TODAY}. Fix agent investigating. Run: ${RUN_URL}"

      - name: Run fix agent
        if: steps.collect.outputs.has_failures == 'true'
        uses: anthropics/claude-code-action@beta
        env:
          KAPA_API_KEY: ${{ secrets.KAPA_API_KEY }}
          KAPA_PROJECT_ID: 1908afc6-c134-4c6f-a684-ed7d8ce91759
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          model: claude-opus-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
          direct_prompt: |
            The scheduled test run found regressions in existing merged examples.
            Failed examples: ${{ steps.collect.outputs.all_failed }}

            For each failing example:
            1. Read the example's source and tests
            2. Search Kapa for current correct SDK usage (instructions/kapa-search.md)
            3. Identify the root cause (outdated SDK, deprecated API, dependency change)
            4. Fix the code
            5. Create a branch and PR:
               - Branch: fix/{slug}-regression-${{ steps.date.outputs.date }}
               - Label: type:fix
               - Title: [Fix] {NNN}-{slug} — {brief description}
               - Do NOT enable auto-merge — process-open-prs.yml handles merge after tests pass

            Today's date: ${{ steps.date.outputs.date }}
            Repository: ${{ github.repository }}
