name: Test Java Examples

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'examples/**/*.java'
      - 'examples/**/pom.xml'
      - 'examples/**/build.gradle'
      - 'examples/**/build.gradle.kts'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to test (default: main)'
        required: false
        default: 'main'

concurrency:
  group: test-java-${{ github.event.pull_request.number || inputs.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_java_examples: ${{ steps.detect.outputs.has_java_examples }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0
      - name: Detect Java examples
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIRS=$(git diff origin/main...HEAD --name-only 2>/dev/null \
              | grep '^examples/' | cut -d/ -f1-2 | sort -u)
          else
            DIRS=$(ls -d examples/*/ 2>/dev/null | sed 's|/$||')
          fi
          COUNT=0
          for dir in $DIRS; do
            if [ -f "${dir}/pom.xml" ] || [ -f "${dir}/build.gradle" ] || [ -f "${dir}/build.gradle.kts" ]; then
              COUNT=$((COUNT + 1))
            fi
          done
          [ "$COUNT" -gt 0 ] && echo "has_java_examples=true" >> $GITHUB_OUTPUT \
                              || echo "has_java_examples=false" >> $GITHUB_OUTPUT
          echo "Found $COUNT Java example(s) to test"

  test:
    needs: detect
    if: needs.detect.outputs.has_java_examples == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run tests for all Java examples
        id: run-tests
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          VONAGE_APPLICATION_ID: ${{ secrets.VONAGE_APPLICATION_ID }}
          VONAGE_PRIVATE_KEY: ${{ secrets.VONAGE_PRIVATE_KEY }}
          DAILY_API_KEY: ${{ secrets.DAILY_API_KEY }}
        run: |
          FAILED_EXAMPLES=""
          MISSING_CRED_EXAMPLES=""

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIRS=$(git diff origin/main...HEAD --name-only 2>/dev/null \
              | grep '^examples/' | cut -d/ -f1-2 | sort -u)
          else
            DIRS=$(ls -d examples/*/ 2>/dev/null | sed 's|/$||')
          fi

          for dir in $DIRS; do
            HAS_JAVA=false
            [ -f "${dir}/pom.xml" ]           && HAS_JAVA=true
            [ -f "${dir}/build.gradle" ]       && HAS_JAVA=true
            [ -f "${dir}/build.gradle.kts" ]   && HAS_JAVA=true
            [ "$HAS_JAVA" = "false" ] && continue

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Testing: $dir"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            pushd "$dir" > /dev/null
            dir="${dir}/"

            # Credential check
            if [ -f ".env.example" ]; then
              MISSING=""
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR="${line%%=*}"; VAR="${VAR// /}"
                [ -z "$VAR" ] && continue
                [ -z "${!VAR+x}" ] || [ -z "${!VAR}" ] && MISSING="$MISSING $VAR"
              done < ".env.example"
              if [ -n "$MISSING" ]; then
                TRIMMED=$(echo "$MISSING" | xargs | tr ' ' ',')
                echo "⚠ MISSING_CREDENTIALS: $TRIMMED"
                MISSING_CRED_EXAMPLES="${MISSING_CRED_EXAMPLES}${dir}:${TRIMMED}|"
                popd > /dev/null; continue
              fi
            fi

            # Run tests
            if [ -f "pom.xml" ]; then
              if mvn test -q 2>&1; then echo "✓ PASSED: $dir"; else echo "✗ FAILED: $dir"; FAILED_EXAMPLES="$FAILED_EXAMPLES $dir"; fi
            elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
              if ./gradlew test 2>&1; then echo "✓ PASSED: $dir"; else echo "✗ FAILED: $dir"; FAILED_EXAMPLES="$FAILED_EXAMPLES $dir"; fi
            fi

            popd > /dev/null
          done

          echo "failed_examples=${FAILED_EXAMPLES}" >> $GITHUB_OUTPUT
          echo "missing_credentials=${MISSING_CRED_EXAMPLES}" >> $GITHUB_OUTPUT
          [ -n "$FAILED_EXAMPLES" ]        && echo "has_failures=true"  >> $GITHUB_OUTPUT || echo "has_failures=false" >> $GITHUB_OUTPUT
          [ -n "$MISSING_CRED_EXAMPLES" ]  && echo "has_missing=true"   >> $GITHUB_OUTPUT || echo "has_missing=false" >> $GITHUB_OUTPUT

      - name: Post missing-credentials comment
        if: steps.run-tests.outputs.has_missing == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const raw = '${{ steps.run-tests.outputs.missing_credentials }}';
            const lines = raw.split('|').filter(Boolean).map(e => {
              const [dir, vars] = e.split(':');
              return `**\`${dir}\`** requires: \`${vars.replace(/,/g, '`, `')}\``;
            }).join('\n');
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number,
              body: ['## ⚠️ Missing credentials', '', lines, '', '@deepgram-devrel — please add these as repository secrets.'].join('\n'),
            });
            try { await github.rest.issues.addLabels({ ...context.repo, issue_number: context.issue.number, labels: ['status:needs-credentials'] }); } catch {}

      - name: Label as fix-needed
        if: steps.run-tests.outputs.has_failures == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            try { await github.rest.issues.addLabels({ ...context.repo, issue_number: context.issue.number, labels: ['status:fix-needed'] }); } catch {}

      - name: Fail on test failures
        if: steps.run-tests.outputs.has_failures == 'true'
        run: exit 1

      - name: Fail on missing credentials
        if: steps.run-tests.outputs.has_missing == 'true' && steps.run-tests.outputs.has_failures != 'true' && github.event_name == 'pull_request'
        run: |
          echo "Tests blocked by missing secrets — see PR comment."
          exit 1
