name: Engineer

on:
  schedule:
    - cron: '27 * * * *'   # Hourly at :27
  issues:
    types:
      - opened
      - labeled
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Queue issue number to build (optional)'
        required: false

concurrency:
  group: engineer
  cancel-in-progress: false

jobs:
  run:
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       contains(github.event.issue.labels.*.name, 'queue:new-example'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
      issues: write
      statuses: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "examples-bot"
          git config user.email "noreply@deepgram.com"

      - name: Get date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Run instruction
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          model: claude-opus-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
          timeout_minutes: 45
          direct_prompt: |
            Read and execute instructions/engineer.md.

            Context:
            - Today's date: ${{ steps.date.outputs.date }}
            - Repository: ${{ github.repository }}
            - Trigger: ${{ github.event_name }}
            - Issue number (if triggered by issue): ${{ github.event.issue.number }}
            - Manual issue override: ${{ inputs.issue_number }}
        env:
          KAPA_API_KEY: ${{ secrets.KAPA_API_KEY }}
          KAPA_PROJECT_ID: ${{ vars.KAPA_PROJECT_ID }}

      - name: Trigger tests on untested example PRs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Dispatch test-examples for any open example/* or fix/* PR that has no test runs yet.
          # GITHUB_TOKEN-created PRs don't fire pull_request events, so we dispatch explicitly.
          gh pr list --repo ${{ github.repository }} --state open \
            --json headRefName \
            --jq '.[] | select(.headRefName | test("^(example|fix)/")) | .headRefName' \
          | while read BRANCH; do
              COUNT=$(gh run list --repo ${{ github.repository }} \
                --workflow=test-examples.yml --branch "$BRANCH" \
                --json databaseId --jq 'length' 2>/dev/null || echo "0")
              if [ "$COUNT" = "0" ]; then
                gh workflow run test-examples.yml \
                  --repo ${{ github.repository }} \
                  --ref "$BRANCH" \
                  -f ref="$BRANCH" || true
                echo "Dispatched tests for $BRANCH"
              fi
            done
