name: Test Node.js Examples

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'examples/**/*.js'
      - 'examples/**/*.ts'
      - 'examples/**/*.mjs'
      - 'examples/**/*.cjs'
      - 'examples/**/package.json'
      - 'examples/**/package-lock.json'
      - 'examples/**/tsconfig.json'

concurrency:
  group: test-node-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_node_examples: ${{ steps.detect.outputs.has_node_examples }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Node.js examples
        id: detect
        run: |
          COUNT=0
          for dir in examples/*/; do
            [ -f "${dir}package.json" ] && COUNT=$((COUNT + 1))
          done
          [ "$COUNT" -gt 0 ] && echo "has_node_examples=true" >> $GITHUB_OUTPUT \
                              || echo "has_node_examples=false" >> $GITHUB_OUTPUT
          echo "Found $COUNT Node.js example(s)"

  test:
    needs: detect
    if: needs.detect.outputs.has_node_examples == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Run tests for all Node.js examples
        id: run-tests
        continue-on-error: true
        run: |
          FAILED_EXAMPLES=""
          MISSING_CRED_EXAMPLES=""

          for dir in examples/*/; do
            [ ! -f "${dir}package.json" ] && continue

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Testing: $dir"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            pushd "$dir" > /dev/null

            # ── Credential check ───────────────────────────────────
            if [ -f ".env.example" ]; then
              MISSING=""
              while IFS= read -r line; do
                # Skip blank lines and comments
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR_NAME="${line%%=*}"
                VAR_NAME="${VAR_NAME// /}"
                [ -z "$VAR_NAME" ] && continue
                # Indirect expansion: check if the variable is set in env
                if [ -z "${!VAR_NAME+x}" ] || [ -z "${!VAR_NAME}" ]; then
                  MISSING="$MISSING $VAR_NAME"
                fi
              done < ".env.example"

              if [ -n "$MISSING" ]; then
                TRIMMED=$(echo "$MISSING" | xargs | tr ' ' ',')
                echo "⚠ MISSING_CREDENTIALS: $TRIMMED"
                MISSING_CRED_EXAMPLES="${MISSING_CRED_EXAMPLES}${dir}:${TRIMMED}|"
                popd > /dev/null
                continue
              fi
            fi
            # ──────────────────────────────────────────────────────

            # Install dependencies
            if [ -f "package-lock.json" ]; then
              npm ci --prefer-offline 2>&1 || npm install 2>&1
            else
              npm install 2>&1
            fi

            # Run tests
            if npm test 2>&1; then
              echo "✓ PASSED: $dir"
            else
              echo "✗ FAILED: $dir"
              FAILED_EXAMPLES="$FAILED_EXAMPLES $dir"
            fi

            popd > /dev/null
          done

          # Persist results for subsequent steps
          echo "failed_examples=${FAILED_EXAMPLES}" >> $GITHUB_OUTPUT
          echo "missing_credentials=${MISSING_CRED_EXAMPLES}" >> $GITHUB_OUTPUT
          [ -n "$FAILED_EXAMPLES" ]        && echo "has_failures=true"  >> $GITHUB_OUTPUT \
                                           || echo "has_failures=false" >> $GITHUB_OUTPUT
          [ -n "$MISSING_CRED_EXAMPLES" ]  && echo "has_missing=true"   >> $GITHUB_OUTPUT \
                                           || echo "has_missing=false"  >> $GITHUB_OUTPUT

      # ── Missing credentials → comment + label ────────────────────────────
      # Labels are read by process-open-prs.yml on its next cron run.
      # Note: adding labels here via GITHUB_TOKEN does NOT trigger fix-pr.yml
      # or any other event-based workflow — that's intentional, process-open-prs
      # is the driver for bot PRs.
      - name: Post missing-credentials comment
        if: steps.run-tests.outputs.has_missing == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const missingRaw = '${{ steps.run-tests.outputs.missing_credentials }}';
            const entries = missingRaw.split('|').filter(Boolean);
            const lines = entries.map(e => {
              const [dir, vars] = e.split(':');
              const varList = vars.split(',').map(v => `\`${v.trim()}\``).join(', ');
              return `**\`${dir}\`** requires: ${varList}`;
            }).join('\n');

            const body = [
              '## ⚠️ Missing credentials — E2E tests cannot run',
              '',
              'This PR requires the following repository secrets to be configured:',
              '',
              lines,
              '',
              '@deepgram-devrel — please add these as [repository secrets]' +
                '(../../settings/secrets/actions) to unblock testing.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['status:needs-credentials'],
              });
            } catch {}

      # ── Real test failures → label for status tracking ───────────────────
      # process-open-prs.yml reads this label and runs the fix agent on its
      # next cron run. Does NOT directly trigger fix-pr.yml for bot PRs.
      - name: Label as fix-needed
        if: steps.run-tests.outputs.has_failures == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['status:fix-needed'],
              });
            } catch {}

      # ── Final gate — fail the check if anything is wrong ─────────────────
      - name: Fail on test failures
        if: steps.run-tests.outputs.has_failures == 'true'
        run: |
          echo "The following Node.js examples have failing tests:"
          echo "${{ steps.run-tests.outputs.failed_examples }}"
          exit 1

      - name: Fail on missing credentials
        if: steps.run-tests.outputs.has_missing == 'true' && steps.run-tests.outputs.has_failures != 'true'
        run: |
          echo "Tests blocked by missing repository secrets — see PR comment for details."
          exit 1
