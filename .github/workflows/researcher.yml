name: Researcher

on:
  issues:
    types:
      - opened
      - labeled
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Queue issue number to research'
        required: false

concurrency:
  group: researcher-${{ github.event.issue.number || inputs.issue_number || 'manual' }}
  cancel-in-progress: false

jobs:
  run:
    # Only run for queue issues that have the action:research label,
    # or on explicit dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       contains(github.event.issue.labels.*.name, 'action:research'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Run instruction
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          model: claude-opus-4-6
          allowed_tools: "Bash,Read,Glob,Grep,WebSearch,WebFetch"
          timeout_minutes: 20
          direct_prompt: |
            Read and execute instructions/researcher.md.
            Issue number: ${{ github.event.issue.number || inputs.issue_number }}
            Repository: ${{ github.repository }}
        env:
          KAPA_API_KEY: ${{ secrets.KAPA_API_KEY }}
          KAPA_PROJECT_ID: ${{ vars.KAPA_PROJECT_ID }}
