name: VP — Unstick Pipeline

# Supervisory role — runs periodically to find anything stuck in the pipeline
# and get it moving. Re-triggers the appropriate agent workflow, or escalates
# to @deepgram-devrel if it cannot resolve the blockage.
#
# A "stuck" item is one where the responsible workflow missed its event trigger
# (GITHUB_TOKEN limitation) or hit a silent failure.

on:
  schedule:
    - cron: '17 */4 * * *'   # Every 4 hours at :17
  workflow_dispatch:

concurrency:
  group: vp
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write   # Needed to trigger other workflows via gh workflow run

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "examples-bot"
          git config user.email "noreply@deepgram.com"

      - name: Get date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Run VP instruction
        uses: anthropics/claude-code-action@beta
        env:
          KAPA_API_KEY: ${{ secrets.KAPA_API_KEY }}
          KAPA_PROJECT_ID: ${{ vars.KAPA_PROJECT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          model: claude-opus-4-6
          allowed_tools: "Bash,Read,Glob,Grep"
          timeout_minutes: 20
          direct_prompt: |
            Read and execute instructions/vp.md.

            Context:
            - Today's date: ${{ steps.date.outputs.date }}
            - Repository: ${{ github.repository }}
            - Run ID: ${{ github.run_id }}
            - Server URL: ${{ github.server_url }}
