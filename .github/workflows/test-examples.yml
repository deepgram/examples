name: Test Examples

# Single workflow for all example languages.
#
# Jobs:
#   detect     — finds changed example dirs, groups by language marker file
#   test-node  — package.json
#   test-python — requirements.txt / pyproject.toml
#   test-go    — go.mod
#   test-java  — pom.xml / build.gradle
#   test-rust  — Cargo.toml
#   test-dotnet — *.csproj / *.sln
#   test-cli   — example.sh / src/*.sh; installs Deepgram CLI first
#   lint-md    — markdownlint --fix; auto-commits; always passes
#   e2e-api-check — required gate; fails only if a language job failed

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'examples/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to test (default: main)'
        required: false
        default: 'main'
      example:
        description: 'Single example dir to test (e.g. examples/020-twilio-media-streams-node). Leave blank to test all.'
        required: false
        default: ''

concurrency:
  group: test-examples-${{ github.event.pull_request.number || inputs.ref || github.ref }}-${{ inputs.example || 'all' }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write

jobs:
  # ── Detect which examples changed and what languages they use ───────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      node_examples:   ${{ steps.scan.outputs.node_examples }}
      python_examples: ${{ steps.scan.outputs.python_examples }}
      go_examples:     ${{ steps.scan.outputs.go_examples }}
      java_examples:   ${{ steps.scan.outputs.java_examples }}
      rust_examples:   ${{ steps.scan.outputs.rust_examples }}
      dotnet_examples: ${{ steps.scan.outputs.dotnet_examples }}
      cli_examples:    ${{ steps.scan.outputs.cli_examples }}
      md_files:        ${{ steps.scan.outputs.md_files }}
      has_node:        ${{ steps.scan.outputs.has_node }}
      has_python:      ${{ steps.scan.outputs.has_python }}
      has_go:          ${{ steps.scan.outputs.has_go }}
      has_java:        ${{ steps.scan.outputs.has_java }}
      has_rust:        ${{ steps.scan.outputs.has_rust }}
      has_dotnet:      ${{ steps.scan.outputs.has_dotnet }}
      has_cli:         ${{ steps.scan.outputs.has_cli }}
      has_md:          ${{ steps.scan.outputs.has_md }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0

      - name: Scan changed example directories
        id: scan
        run: |
          # On PR/push/dispatch-to-branch: only dirs changed vs main.
          # On dispatch-to-main: all dirs, or a single example if specified.
          REF="${{ inputs.ref }}"
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "pull_request" ] || [ "$EVENT" = "push" ] || \
             ( [ "$EVENT" = "workflow_dispatch" ] && [ -n "$REF" ] && [ "$REF" != "main" ] ); then
            DIRS=$(git diff origin/main...HEAD --name-only 2>/dev/null \
              | grep '^examples/' | cut -d/ -f1-2 | sort -u | grep -v '^\s*$')
          elif [ -n "${{ inputs.example }}" ]; then
            DIRS="${{ inputs.example }}"
          else
            DIRS=$(ls -d examples/*/ 2>/dev/null | sed 's|/$||')
          fi

          NODE_EX="" PYTHON_EX="" GO_EX="" JAVA_EX="" RUST_EX="" DOTNET_EX="" CLI_EX="" MD_FILES=""

          for dir in $DIRS; do
            [ ! -d "$dir" ] && continue
            [ -f "${dir}/package.json" ]                                && NODE_EX="${NODE_EX} ${dir}"
            [ -f "${dir}/requirements.txt" ]                            && PYTHON_EX="${PYTHON_EX} ${dir}"
            [ -f "${dir}/pyproject.toml" ]                              && PYTHON_EX="${PYTHON_EX} ${dir}"
            [ -f "${dir}/go.mod" ]                                      && GO_EX="${GO_EX} ${dir}"
            [ -f "${dir}/pom.xml" ] || [ -f "${dir}/build.gradle" ]    && JAVA_EX="${JAVA_EX} ${dir}"
            [ -f "${dir}/Cargo.toml" ]                                  && RUST_EX="${RUST_EX} ${dir}"
            ls "${dir}"/*.csproj "${dir}"/*.sln 2>/dev/null | grep -q . && DOTNET_EX="${DOTNET_EX} ${dir}"
            [ -f "${dir}/example.sh" ] || ls "${dir}"/src/*.sh 2>/dev/null | grep -q . && CLI_EX="${CLI_EX} ${dir}"
            [ -f "${dir}/README.md" ]                                   && MD_FILES="${MD_FILES} ${dir}/README.md"
          done

          for v in NODE_EX PYTHON_EX GO_EX JAVA_EX RUST_EX DOTNET_EX CLI_EX MD_FILES; do
            eval "$v=\$(echo \${$v} | xargs)"
          done

          echo "node_examples=$NODE_EX"     >> $GITHUB_OUTPUT
          echo "python_examples=$PYTHON_EX" >> $GITHUB_OUTPUT
          echo "go_examples=$GO_EX"         >> $GITHUB_OUTPUT
          echo "java_examples=$JAVA_EX"     >> $GITHUB_OUTPUT
          echo "rust_examples=$RUST_EX"     >> $GITHUB_OUTPUT
          echo "dotnet_examples=$DOTNET_EX" >> $GITHUB_OUTPUT
          echo "cli_examples=$CLI_EX"       >> $GITHUB_OUTPUT
          echo "md_files=$MD_FILES"         >> $GITHUB_OUTPUT

          [ -n "$NODE_EX" ]   && echo "has_node=true"   >> $GITHUB_OUTPUT || echo "has_node=false"   >> $GITHUB_OUTPUT
          [ -n "$PYTHON_EX" ] && echo "has_python=true" >> $GITHUB_OUTPUT || echo "has_python=false" >> $GITHUB_OUTPUT
          [ -n "$GO_EX" ]     && echo "has_go=true"     >> $GITHUB_OUTPUT || echo "has_go=false"     >> $GITHUB_OUTPUT
          [ -n "$JAVA_EX" ]   && echo "has_java=true"   >> $GITHUB_OUTPUT || echo "has_java=false"   >> $GITHUB_OUTPUT
          [ -n "$RUST_EX" ]   && echo "has_rust=true"   >> $GITHUB_OUTPUT || echo "has_rust=false"   >> $GITHUB_OUTPUT
          [ -n "$DOTNET_EX" ] && echo "has_dotnet=true" >> $GITHUB_OUTPUT || echo "has_dotnet=false" >> $GITHUB_OUTPUT
          [ -n "$CLI_EX" ]    && echo "has_cli=true"    >> $GITHUB_OUTPUT || echo "has_cli=false"    >> $GITHUB_OUTPUT
          [ -n "$MD_FILES" ]  && echo "has_md=true"     >> $GITHUB_OUTPUT || echo "has_md=false"     >> $GITHUB_OUTPUT

          echo ""
          echo "Node:    ${NODE_EX:-none}"
          echo "Python:  ${PYTHON_EX:-none}"
          echo "Go:      ${GO_EX:-none}"
          echo "Java:    ${JAVA_EX:-none}"
          echo "Rust:    ${RUST_EX:-none}"
          echo ".NET:    ${DOTNET_EX:-none}"
          echo "CLI:     ${CLI_EX:-none}"
          echo "Markdown:${MD_FILES:-none}"

  # ── Node.js ─────────────────────────────────────────────────────────────────
  test-node:
    needs: detect
    if: needs.detect.outputs.has_node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: latest
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - name: Run Node.js tests
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY:      ${{ secrets.DEEPGRAM_API_KEY }}
          TWILIO_ACCOUNT_SID:    ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:     ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER:   ${{ secrets.TWILIO_PHONE_NUMBER }}
          LIVEKIT_URL:           ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY:       ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET:    ${{ secrets.LIVEKIT_API_SECRET }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          DISCORD_BOT_TOKEN:     ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID:     ${{ secrets.DISCORD_CLIENT_ID }}
          VONAGE_APPLICATION_ID: ${{ secrets.VONAGE_APPLICATION_ID }}
          VONAGE_PRIVATE_KEY:    ${{ secrets.VONAGE_PRIVATE_KEY }}
          DAILY_API_KEY:         ${{ secrets.DAILY_API_KEY }}
          PIPECAT_API_KEY:       ${{ secrets.PIPECAT_API_KEY }}
          SLACK_BOT_TOKEN:       ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN:       ${{ secrets.SLACK_APP_TOKEN }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          FAILED="" MISSING=""
          for dir in ${{ needs.detect.outputs.node_examples }}; do
            echo ""; echo "── $dir ──"
            pushd "$dir" > /dev/null
            MISSING_VARS=""
            if [ -f ".env.example" ]; then
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR="${line%%=*}"; VAR="${VAR// /}"
                [ -z "$VAR" ] && continue
                [ -z "${!VAR+x}" ] || [ -z "${!VAR}" ] && MISSING_VARS="$MISSING_VARS $VAR"
              done < ".env.example"
            fi
            if [ -n "$MISSING_VARS" ]; then
              echo "⏳ MISSING_CREDENTIALS:$(echo $MISSING_VARS | tr ' ' ',')"
              MISSING="$MISSING $dir"
              popd > /dev/null; continue
            fi
            # Detect package manager from lockfile — pnpm/bun/deno required for new examples
            if [ -f "pnpm-lock.yaml" ]; then
              pnpm audit --audit-level=high || { echo "✗ AUDIT-FAILED"; FAILED="$FAILED $dir"; popd > /dev/null; continue; }
              pnpm install --frozen-lockfile
              pnpm test && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            elif [ -f "bun.lockb" ] || [ -f "bun.lock" ]; then
              bun install --frozen-lockfile
              bun test && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            elif [ -f "deno.json" ] || [ -f "deno.jsonc" ]; then
              deno test && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            else
              # Legacy npm fallback for examples predating the pnpm/bun/deno rule
              npm audit --audit-level=high || { echo "✗ AUDIT-FAILED"; FAILED="$FAILED $dir"; popd > /dev/null; continue; }
              npm install --prefer-offline -q 2>/dev/null || npm install -q
              npm test && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            fi
            popd > /dev/null
          done
          echo "failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT
          [ -n "$FAILED" ] && exit 1 || exit 0

      - name: Comment missing credentials
        if: steps.test.outputs.missing != '' && github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const missing = '${{ steps.test.outputs.missing }}'.trim().split(/\s+/).filter(Boolean);
            if (!missing.length) return;
            const existing = await github.rest.issues.listComments({ ...context.repo, issue_number: context.issue.number });
            if (existing.data.some(c => c.body.includes('Missing credentials'))) return;
            await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number,
              body: `⏳ **Missing credentials** — these Node.js examples need secrets:\n\n${missing.map(d => `- \`${d}\``).join('\n')}\n\n@deepgram/devrel please add the required secrets.` });

  # ── Python ───────────────────────────────────────────────────────────────────
  test-python:
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Run Python tests
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY:      ${{ secrets.DEEPGRAM_API_KEY }}
          TWILIO_ACCOUNT_SID:    ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:     ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER:   ${{ secrets.TWILIO_PHONE_NUMBER }}
          LIVEKIT_URL:           ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY:       ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET:    ${{ secrets.LIVEKIT_API_SECRET }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          DISCORD_BOT_TOKEN:     ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID:     ${{ secrets.DISCORD_CLIENT_ID }}
          VONAGE_APPLICATION_ID: ${{ secrets.VONAGE_APPLICATION_ID }}
          VONAGE_PRIVATE_KEY:    ${{ secrets.VONAGE_PRIVATE_KEY }}
          DAILY_API_KEY:         ${{ secrets.DAILY_API_KEY }}
          PIPECAT_API_KEY:       ${{ secrets.PIPECAT_API_KEY }}
          SLACK_BOT_TOKEN:       ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN:       ${{ secrets.SLACK_APP_TOKEN }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          FAILED="" MISSING=""
          for dir in ${{ needs.detect.outputs.python_examples }}; do
            echo ""; echo "── $dir ──"
            pushd "$dir" > /dev/null
            MISSING_VARS=""
            if [ -f ".env.example" ]; then
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR="${line%%=*}"; VAR="${VAR// /}"
                [ -z "$VAR" ] && continue
                [ -z "${!VAR+x}" ] || [ -z "${!VAR}" ] && MISSING_VARS="$MISSING_VARS $VAR"
              done < ".env.example"
            fi
            if [ -n "$MISSING_VARS" ]; then
              echo "⏳ MISSING_CREDENTIALS:$(echo $MISSING_VARS | tr ' ' ',')"
              MISSING="$MISSING $dir"; popd > /dev/null; continue
            fi
            pip install -q --upgrade pip
            [ -f "requirements.txt" ] && pip install -q -r requirements.txt
            [ -f "pyproject.toml" ]   && pip install -q -e .
            if find tests/ -name "test_*.py" 2>/dev/null | grep -q .; then
              pip install -q pytest
              python -m pytest tests/ -q && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            elif ls tests/*.py 2>/dev/null | head -1 | grep -q .; then
              python "$(ls tests/*.py | head -1)" && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            else
              echo "⚠ No tests found"
            fi
            popd > /dev/null
          done
          echo "failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT
          [ -n "$FAILED" ] && exit 1 || exit 0

      - name: Audit Python dependencies
        run: |
          pip install -q pip-audit
          FAILED=""
          for dir in ${{ needs.detect.outputs.python_examples }}; do
            [ -f "${dir}/requirements.txt" ] || continue
            echo "── audit: $dir ──"
            pip-audit -r "${dir}/requirements.txt" || FAILED="$FAILED $dir"
          done
          [ -n "$FAILED" ] && { echo "✗ pip-audit failed for:$FAILED"; exit 1; } || true

      - name: Comment missing credentials
        if: steps.test.outputs.missing != '' && github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const missing = '${{ steps.test.outputs.missing }}'.trim().split(/\s+/).filter(Boolean);
            if (!missing.length) return;
            const existing = await github.rest.issues.listComments({ ...context.repo, issue_number: context.issue.number });
            if (existing.data.some(c => c.body.includes('Missing credentials'))) return;
            await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number,
              body: `⏳ **Missing credentials** — these Python examples need secrets:\n\n${missing.map(d => `- \`${d}\``).join('\n')}\n\n@deepgram/devrel please add the required secrets.` });

  # ── Go ───────────────────────────────────────────────────────────────────────
  test-go:
    needs: detect
    if: needs.detect.outputs.has_go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'
      - name: Run Go tests
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          FAILED="" MISSING=""
          for dir in ${{ needs.detect.outputs.go_examples }}; do
            echo ""; echo "── $dir ──"
            pushd "$dir" > /dev/null
            MISSING_VARS=""
            if [ -f ".env.example" ]; then
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR="${line%%=*}"; VAR="${VAR// /}"
                [ -z "$VAR" ] && continue
                [ -z "${!VAR+x}" ] || [ -z "${!VAR}" ] && MISSING_VARS="$MISSING_VARS $VAR"
              done < ".env.example"
            fi
            if [ -n "$MISSING_VARS" ]; then
              echo "⏳ MISSING_CREDENTIALS:$(echo $MISSING_VARS | tr ' ' ',')"
              MISSING="$MISSING $dir"; popd > /dev/null; continue
            fi
            go mod download
            go mod verify
            go test ./... -v -timeout 60s && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            popd > /dev/null
          done
          echo "failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT
          [ -n "$FAILED" ] && exit 1 || exit 0

  # ── Java ─────────────────────────────────────────────────────────────────────
  test-java:
    needs: detect
    if: needs.detect.outputs.has_java == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Run Java tests
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          FAILED="" MISSING=""
          for dir in ${{ needs.detect.outputs.java_examples }}; do
            echo ""; echo "── $dir ──"
            pushd "$dir" > /dev/null
            MISSING_VARS=""
            if [ -f ".env.example" ]; then
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR="${line%%=*}"; VAR="${VAR// /}"
                [ -z "$VAR" ] && continue
                [ -z "${!VAR+x}" ] || [ -z "${!VAR}" ] && MISSING_VARS="$MISSING_VARS $VAR"
              done < ".env.example"
            fi
            if [ -n "$MISSING_VARS" ]; then
              echo "⏳ MISSING_CREDENTIALS:$(echo $MISSING_VARS | tr ' ' ',')"
              MISSING="$MISSING $dir"; popd > /dev/null; continue
            fi
            if [ -f "pom.xml" ]; then
              mvn test -q && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            else
              ./gradlew test && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            fi
            popd > /dev/null
          done
          echo "failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT
          [ -n "$FAILED" ] && exit 1 || exit 0

  # ── Rust ─────────────────────────────────────────────────────────────────────
  test-rust:
    needs: detect
    if: needs.detect.outputs.has_rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0
      - name: Run Rust tests
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          FAILED="" MISSING=""
          for dir in ${{ needs.detect.outputs.rust_examples }}; do
            echo ""; echo "── $dir ──"
            pushd "$dir" > /dev/null
            MISSING_VARS=""
            if [ -f ".env.example" ]; then
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR="${line%%=*}"; VAR="${VAR// /}"
                [ -z "$VAR" ] && continue
                [ -z "${!VAR+x}" ] || [ -z "${!VAR}" ] && MISSING_VARS="$MISSING_VARS $VAR"
              done < ".env.example"
            fi
            if [ -n "$MISSING_VARS" ]; then
              echo "⏳ MISSING_CREDENTIALS:$(echo $MISSING_VARS | tr ' ' ',')"
              MISSING="$MISSING $dir"; popd > /dev/null; continue
            fi
            cargo test && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            popd > /dev/null
          done
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          [ -n "$FAILED" ] && exit 1 || exit 0

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --quiet
          FAILED=""
          for dir in ${{ needs.detect.outputs.rust_examples }}; do
            [ -f "${dir}/Cargo.toml" ] || continue
            echo "── audit: $dir ──"
            cargo audit --file "${dir}/Cargo.lock" || FAILED="$FAILED $dir"
          done
          [ -n "$FAILED" ] && { echo "✗ cargo-audit failed for:$FAILED"; exit 1; } || true

  # ── .NET ─────────────────────────────────────────────────────────────────────
  test-dotnet:
    needs: detect
    if: needs.detect.outputs.has_dotnet == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0'
      - name: Run .NET tests
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          FAILED="" MISSING=""
          for dir in ${{ needs.detect.outputs.dotnet_examples }}; do
            echo ""; echo "── $dir ──"
            pushd "$dir" > /dev/null
            MISSING_VARS=""
            if [ -f ".env.example" ]; then
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR="${line%%=*}"; VAR="${VAR// /}"
                [ -z "$VAR" ] && continue
                [ -z "${!VAR+x}" ] || [ -z "${!VAR}" ] && MISSING_VARS="$MISSING_VARS $VAR"
              done < ".env.example"
            fi
            if [ -n "$MISSING_VARS" ]; then
              echo "⏳ MISSING_CREDENTIALS:$(echo $MISSING_VARS | tr ' ' ',')"
              MISSING="$MISSING $dir"; popd > /dev/null; continue
            fi
            dotnet test && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            popd > /dev/null
          done
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          [ -n "$FAILED" ] && exit 1 || exit 0

      - name: Audit .NET dependencies
        run: |
          FAILED=""
          for dir in ${{ needs.detect.outputs.dotnet_examples }}; do
            echo "── audit: $dir ──"
            dotnet list "$dir" package --vulnerable || FAILED="$FAILED $dir"
          done
          [ -n "$FAILED" ] && { echo "✗ dotnet vulnerable packages found in:$FAILED"; exit 1; } || true

  # ── CLI (Deepgram CLI — installed via install.sh) ────────────────────────────
  test-cli:
    needs: detect
    if: needs.detect.outputs.has_cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0

      - name: Install Deepgram CLI
        run: |
          curl -fsSL https://deepgram.com/install.sh | sh
          # Ensure CLI is on PATH
          echo "$HOME/.deepgram/bin" >> $GITHUB_PATH
          echo "/usr/local/bin"      >> $GITHUB_PATH

      - name: Run CLI tests
        id: test
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          FAILED="" MISSING=""
          for dir in ${{ needs.detect.outputs.cli_examples }}; do
            echo ""; echo "── $dir ──"
            pushd "$dir" > /dev/null
            MISSING_VARS=""
            if [ -f ".env.example" ]; then
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR="${line%%=*}"; VAR="${VAR// /}"
                [ -z "$VAR" ] && continue
                [ -z "${!VAR+x}" ] || [ -z "${!VAR}" ] && MISSING_VARS="$MISSING_VARS $VAR"
              done < ".env.example"
            fi
            if [ -n "$MISSING_VARS" ]; then
              echo "⏳ MISSING_CREDENTIALS:$(echo $MISSING_VARS | tr ' ' ',')"
              MISSING="$MISSING $dir"; popd > /dev/null; continue
            fi
            # Run example_test.sh if present, otherwise run example.sh directly
            if [ -f "example_test.sh" ]; then
              bash example_test.sh && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            elif [ -f "example.sh" ]; then
              bash example.sh && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            else
              bash "$(ls src/*.sh | head -1)" && echo "✓ PASSED" || { echo "✗ FAILED"; FAILED="$FAILED $dir"; }
            fi
            popd > /dev/null
          done
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          [ -n "$FAILED" ] && exit 1 || exit 0

  # ── Markdown lint (auto-fix, always passes) ──────────────────────────────────
  lint-md:
    needs: detect
    if: needs.detect.outputs.has_md == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || '' }}
          fetch-depth: 0

      - name: Configure git
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "examples-bot"
          git config user.email "noreply@deepgram.com"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli --silent

      - name: Lint and auto-fix markdown
        run: |
          FILES="${{ needs.detect.outputs.md_files }}"
          echo "Linting: $FILES"
          # --fix applies auto-fixable rules (trailing spaces, blank lines, etc.)
          markdownlint --fix $FILES 2>&1 || true
          echo "✓ Lint complete (auto-fixes applied if any)"

      - name: Commit fixes if any
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet; then
            echo "No markdown fixes needed."
          else
            git add ${{ needs.detect.outputs.md_files }}
            git commit -m "style(docs): auto-fix markdown lint issues [skip ci]"
            git push origin HEAD
            echo "✓ Committed markdown fixes"
          fi

  # ── Final gate — the required branch-protection check ────────────────────────
  # Runs after all language jobs regardless of their outcome.
  # Fails only if a language job actually failed (not skipped, not missing-creds).
  e2e-api-check:
    needs: [detect, test-node, test-python, test-go, test-java, test-rust, test-dotnet, test-cli, lint-md]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          NODE="${{ needs.test-node.result }}"
          PYTHON="${{ needs.test-python.result }}"
          GO="${{ needs.test-go.result }}"
          JAVA="${{ needs.test-java.result }}"
          RUST="${{ needs.test-rust.result }}"
          DOTNET="${{ needs.test-dotnet.result }}"
          CLI="${{ needs.test-cli.result }}"

          printf "%-8s %s\n" "node:"   "$NODE"
          printf "%-8s %s\n" "python:" "$PYTHON"
          printf "%-8s %s\n" "go:"     "$GO"
          printf "%-8s %s\n" "java:"   "$JAVA"
          printf "%-8s %s\n" "rust:"   "$RUST"
          printf "%-8s %s\n" "dotnet:" "$DOTNET"
          printf "%-8s %s\n" "cli:"    "$CLI"

          # skipped = no examples of that language — fine
          # success = tests passed — fine
          # failure / cancelled = block merge
          FAILED=false
          for result in "$NODE" "$PYTHON" "$GO" "$JAVA" "$RUST" "$DOTNET" "$CLI"; do
            [ "$result" = "failure" ]   && FAILED=true
            [ "$result" = "cancelled" ] && FAILED=true
          done

          if [ "$FAILED" = "true" ]; then
            echo "❌ One or more test jobs failed — blocking merge"
            echo "outcome=failure" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ All applicable tests passed (skipped = no examples of that language)"
          fi
