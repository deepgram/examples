name: Test PR Example

# Runs the test for whichever example is being added or modified in this PR.
# This is the required status check — a PR cannot merge until this passes.
#
# Triggered by pull_request (human pushes) and workflow_dispatch (manual).
# For bot PRs (GITHUB_TOKEN pushes), process-open-prs Phase 1 runs the
# equivalent check natively before Phase 3 is allowed to merge.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'examples/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test'
        required: true

concurrency:
  group: test-pr-example-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    name: Test changed example
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHA=$(gh pr view ${{ inputs.pr_number }} \
              --repo ${{ github.repository }} \
              --json headRefOid --jq '.headRefOid')
            echo "sha=$SHA" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0

      - name: Find changed example directories
        id: find
        run: |
          DIRS=$(git diff origin/main...HEAD --name-only 2>/dev/null \
            | grep '^examples/' \
            | cut -d/ -f1-2 \
            | sort -u \
            | grep -v '^\s*$')

          if [ -z "$DIRS" ]; then
            echo "No changed example directories found."
            echo "has_examples=false" >> $GITHUB_OUTPUT
          else
            echo "Changed examples:"
            echo "$DIRS"
            echo "has_examples=true" >> $GITHUB_OUTPUT
            # Space-separated for use in later steps
            echo "dirs=$(echo $DIRS | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.find.outputs.has_examples == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        if: steps.find.outputs.has_examples == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Go
        if: steps.find.outputs.has_examples == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        if: steps.find.outputs.has_examples == 'true'
        id: run
        continue-on-error: true
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
        run: |
          FAILED=""
          MISSING=""

          for dir in ${{ steps.find.outputs.dirs }}; do
            [ ! -d "$dir" ] && echo "Directory $dir not found — skipping" && continue

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Testing: $dir"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # ── Detect language ───────────────────────────────────────────────
            LANG=""
            [ -f "$dir/package.json" ]    && LANG="node"
            [ -f "$dir/requirements.txt" ] && LANG="python"
            [ -f "$dir/pyproject.toml" ]  && LANG="python"
            [ -f "$dir/go.mod" ]          && LANG="go"

            if [ -z "$LANG" ]; then
              echo "  No recognised language marker — skipping"
              continue
            fi
            echo "  Language: $LANG"

            # ── Credential check ──────────────────────────────────────────────
            # Read .env.example and check every listed variable is set
            if [ -f "$dir/.env.example" ]; then
              MISSING_VARS=""
              while IFS= read -r line; do
                [[ -z "${line// }" || "$line" == \#* ]] && continue
                VAR="${line%%=*}"; VAR="${VAR// /}"
                [ -z "$VAR" ] && continue
                if [ -z "${!VAR+x}" ] || [ -z "${!VAR}" ]; then
                  MISSING_VARS="$MISSING_VARS $VAR"
                fi
              done < "$dir/.env.example"

              if [ -n "$MISSING_VARS" ]; then
                TRIMMED=$(echo "$MISSING_VARS" | xargs | tr ' ' ',')
                echo "  ⚠ Missing credentials: $TRIMMED"
                MISSING="${MISSING}${dir}:${TRIMMED}|"
                continue
              fi
            fi

            # ── Install & test ────────────────────────────────────────────────
            pushd "$dir" > /dev/null

            if [ "$LANG" = "node" ]; then
              npm install --prefer-offline 2>&1
              if npm test 2>&1; then
                echo "  ✓ PASSED"
              else
                echo "  ✗ FAILED"
                FAILED="$FAILED $dir"
              fi

            elif [ "$LANG" = "python" ]; then
              pip install -q --upgrade pip
              [ -f "requirements.txt" ] && pip install -q -r requirements.txt
              [ -f "pyproject.toml" ]   && pip install -q -e .
              # Run pytest or direct script
              if find tests/ -name "test_*.py" 2>/dev/null | grep -q .; then
                pip install -q pytest
                if python -m pytest tests/ -v 2>&1; then
                  echo "  ✓ PASSED"
                else
                  echo "  ✗ FAILED"
                  FAILED="$FAILED $dir"
                fi
              elif ls tests/*.py 2>/dev/null | head -1 | grep -q .; then
                SCRIPT=$(ls tests/*.py | head -1)
                if python "$SCRIPT" 2>&1; then
                  echo "  ✓ PASSED"
                else
                  echo "  ✗ FAILED"
                  FAILED="$FAILED $dir"
                fi
              else
                echo "  ⚠ No test files found"
              fi

            elif [ "$LANG" = "go" ]; then
              go mod download
              if go test ./... -v -timeout 60s 2>&1; then
                echo "  ✓ PASSED"
              else
                echo "  ✗ FAILED"
                FAILED="$FAILED $dir"
              fi
            fi

            popd > /dev/null
          done

          # Write outputs
          echo "failed=${FAILED}" >> $GITHUB_OUTPUT
          echo "missing=${MISSING}" >> $GITHUB_OUTPUT
          [ -n "$FAILED" ]  && echo "has_failures=true"  >> $GITHUB_OUTPUT || echo "has_failures=false"  >> $GITHUB_OUTPUT
          [ -n "$MISSING" ] && echo "has_missing=true"   >> $GITHUB_OUTPUT || echo "has_missing=false" >> $GITHUB_OUTPUT

      # ── Post comment for missing credentials (PR events only) ────────────────
      - name: Comment — missing credentials
        if: steps.run.outputs.has_missing == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const raw = '${{ steps.run.outputs.missing }}';
            const entries = raw.split('|').filter(Boolean);
            const lines = entries.map(e => {
              const [dir, vars] = e.split(':');
              return `**\`${dir}\`** requires: \`${vars.replace(/,/g, '`, `')}\``;
            }).join('\n');

            // Only post once
            const comments = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number
            });
            const already = comments.data.some(c => c.body.includes('Missing credentials'));
            if (!already) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: [
                  '## ⚠️ Missing credentials — tests cannot run',
                  '',
                  lines,
                  '',
                  '@deepgram-devrel please add these as [repository secrets](../../settings/secrets/actions).',
                ].join('\n'),
              });
            }

      # ── Hard fail gates ───────────────────────────────────────────────────────
      - name: Fail — test failures
        if: steps.run.outputs.has_failures == 'true'
        run: |
          echo "The following examples have failing tests:"
          echo "${{ steps.run.outputs.failed }}"
          exit 1

      - name: Fail — missing credentials
        if: steps.run.outputs.has_missing == 'true' && steps.run.outputs.has_failures != 'true'
        run: |
          echo "Tests blocked by missing repository secrets — see PR comment."
          exit 1

      - name: No examples changed
        if: steps.find.outputs.has_examples == 'false'
        run: echo "No example directories changed — nothing to test."
