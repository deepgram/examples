name: Process Open PRs

# Backbone of the autonomous loop. Runs on a schedule because GITHUB_TOKEN
# actions cannot trigger other workflows.
#
# Two-phase design:
#   Phase 1 — native CI: runs tests on every open PR branch and records results.
#              This is NOT delegated to the agent — it uses real test runners.
#   Phase 2 — agent: reads test results, fixes failures, reviews passing PRs,
#              merges only PRs where Phase 1 produced at least one passing check.
#
# The agent cannot merge a PR that Phase 1 marked as untested or failing.

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:

concurrency:
  group: process-open-prs
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write
  statuses: write

jobs:
  # ── Phase 1: Run tests on all open PRs ─────────────────────────────────────
  test-prs:
    runs-on: ubuntu-latest
    outputs:
      results: ${{ steps.run-tests.outputs.results }}
      has_prs: ${{ steps.run-tests.outputs.has_prs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "examples-bot"
          git config user.email "noreply@deepgram.com"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test all open PR branches
        id: run-tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          VONAGE_APPLICATION_ID: ${{ secrets.VONAGE_APPLICATION_ID }}
          VONAGE_PRIVATE_KEY: ${{ secrets.VONAGE_PRIVATE_KEY }}
          DAILY_API_KEY: ${{ secrets.DAILY_API_KEY }}
        run: |
          # Find all open [Example] and [Fix] PRs
          PRS=$(gh pr list --state open \
            --json number,title,headRefName \
            --jq '.[] | select(.title | test("^\\[(Example|Fix)\\]")) | "\(.number)|\(.title)|\(.headRefName)"')

          if [ -z "$PRS" ]; then
            echo "has_prs=false" >> $GITHUB_OUTPUT
            echo "results=" >> $GITHUB_OUTPUT
            echo "No open example PRs found."
            exit 0
          fi

          echo "has_prs=true" >> $GITHUB_OUTPUT

          # results format: "PR_NUMBER:STATUS:DETAILS ..." space-separated
          ALL_RESULTS=""

          while IFS='|' read -r PR_NUM PR_TITLE BRANCH; do
            [ -z "$PR_NUM" ] && continue
            echo ""
            echo "════════════════════════════════════"
            echo "PR #$PR_NUM: $PR_TITLE"
            echo "Branch: $BRANCH"
            echo "════════════════════════════════════"

            # Checkout the PR branch
            git fetch origin "$BRANCH" 2>/dev/null || { echo "Cannot fetch $BRANCH — skipping"; ALL_RESULTS="$ALL_RESULTS $PR_NUM:SKIP:cannot_fetch"; continue; }
            git checkout "$BRANCH" 2>/dev/null || { echo "Cannot checkout $BRANCH — skipping"; ALL_RESULTS="$ALL_RESULTS $PR_NUM:SKIP:cannot_checkout"; continue; }

            PR_STATUS="PASS"
            PR_DETAILS=""
            MISSING_CREDS=""

            # Only test examples that are NEW or CHANGED in this PR (not all of examples/)
            # This avoids reporting missing Twilio/LiveKit creds for existing examples
            NEW_DIRS=$(git diff origin/main..."$BRANCH" --name-only 2>/dev/null \
              | grep '^examples/' | cut -d/ -f1-2 | sort -u | grep -v '^\s*$')

            if [ -z "$NEW_DIRS" ]; then
              echo "No changed example directories found — skipping tests"
              ALL_RESULTS="$ALL_RESULTS $PR_NUM:SKIP:no_changes"
              git checkout main 2>/dev/null || true
              continue
            fi

            echo "Changed examples: $NEW_DIRS"

            for dir in $NEW_DIRS; do
              [ ! -d "$dir" ] && continue
              LANG=""
              [ -f "${dir}package.json" ]    && LANG="node"
              [ -f "${dir}requirements.txt" ] && LANG="python"
              [ -f "${dir}pyproject.toml" ]  && LANG="python"
              [ -f "${dir}go.mod" ]          && LANG="go"
              [ -z "$LANG" ] && continue

              echo "--- Testing $dir ($LANG) ---"
              pushd "$dir" > /dev/null

              # Check credentials
              MISSING=""
              if [ -f ".env.example" ]; then
                while IFS= read -r line; do
                  [[ -z "${line// }" || "$line" == \#* ]] && continue
                  VAR="${line%%=*}"; VAR="${VAR// /}"
                  [ -z "$VAR" ] && continue
                  [ -z "${!VAR+x}" ] || [ -z "${!VAR}" ] && MISSING="$MISSING $VAR"
                done < ".env.example"
              fi

              if [ -n "$MISSING" ]; then
                echo "⚠ Missing credentials: $MISSING"
                MISSING_CREDS="$MISSING_CREDS,$dir:$(echo $MISSING | xargs | tr ' ' '+')"
                popd > /dev/null
                continue
              fi

              # Run tests by language
              TEST_PASS=false
              if [ "$LANG" = "node" ]; then
                [ -f "package-lock.json" ] && npm ci --prefer-offline -q 2>&1 || npm install -q 2>&1
                npm test 2>&1 && TEST_PASS=true || true
              elif [ "$LANG" = "python" ]; then
                pip install -q -r requirements.txt 2>&1 2>/dev/null || pip install -q -e . 2>&1 2>/dev/null
                if find tests/ -name "test_*.py" 2>/dev/null | grep -q .; then
                  python -m pytest tests/ -q 2>&1 && TEST_PASS=true || true
                elif ls tests/*.py 2>/dev/null | head -1 | grep -q .; then
                  python "$(ls tests/*.py | head -1)" 2>&1 && TEST_PASS=true || true
                fi
              elif [ "$LANG" = "go" ]; then
                go mod download -x 2>/dev/null
                go test ./... 2>&1 && TEST_PASS=true || true
              fi

              if [ "$TEST_PASS" = "false" ]; then
                echo "✗ FAILED: $dir"
                PR_STATUS="FAIL"
                PR_DETAILS="$PR_DETAILS,$dir"
              else
                echo "✓ PASSED: $dir"
              fi

              popd > /dev/null
            done

            # Label the PR based on results
            if [ -n "$MISSING_CREDS" ]; then
              gh pr edit "$PR_NUM" --add-label "status:needs-credentials" 2>/dev/null || true
              # Only post comment if not already posted
              ALREADY=$(gh pr view "$PR_NUM" --json comments --jq '[.comments[].body | select(contains("Missing credentials"))] | length')
              if [ "$ALREADY" = "0" ]; then
                VARLIST=$(echo "$MISSING_CREDS" | tr ',' '\n' | grep ':' | sed 's/.*://' | tr '+' ' ' | sort -u | tr '\n' ' ')
                gh pr comment "$PR_NUM" --body "@deepgram-devrel This PR needs repository secrets to run E2E tests: $VARLIST" 2>/dev/null || true
              fi
              [ "$PR_STATUS" = "PASS" ] && PR_STATUS="MISSING_CREDS"
            fi

            if [ "$PR_STATUS" = "FAIL" ]; then
              gh pr edit "$PR_NUM" --add-label "status:fix-needed" 2>/dev/null || true
            fi

            ALL_RESULTS="$ALL_RESULTS $PR_NUM:$PR_STATUS:$(echo $PR_DETAILS | tr ',' '_')"

            # Post a commit status so branch protection can gate on test results.
            # Uses the same context name as test-pr-example.yml so one branch
            # protection rule covers both human PRs and bot PRs.
            SHA=$(gh pr view "$PR_NUM" --json headRefOid --jq '.headRefOid' 2>/dev/null)
            if [ -n "$SHA" ]; then
              case "$PR_STATUS" in
                PASS)
                  STATE="success"; DESC="All tests passed" ;;
                MISSING_CREDS)
                  STATE="failure"; DESC="Missing credentials — tests could not run" ;;
                FAIL)
                  STATE="failure"; DESC="Tests failed" ;;
                *)
                  STATE="pending"; DESC="Tests skipped or branch unavailable" ;;
              esac
              gh api "repos/${{ github.repository }}/statuses/$SHA" \
                --method POST \
                -f state="$STATE" \
                -f context="e2e-api-check" \
                -f description="$DESC" \
                -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                2>/dev/null || true
              echo "  Posted commit status: $STATE ($DESC)"
            fi

            # Return to main
            git checkout main 2>/dev/null || true
          done <<< "$PRS"

          echo "results=${ALL_RESULTS}" >> $GITHUB_OUTPUT
          echo ""
          echo "Test results: $ALL_RESULTS"

  # ── Phase 2: Agent fixes and reviews (NO merging) ─────────────────────────
  # Merging is handled by Phase 3 in native shell — never delegated to the agent
  # because LLM agents cannot be trusted to reliably enforce conditional logic.
  agent:
    needs: test-prs
    if: needs.test-prs.outputs.has_prs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "examples-bot"
          git config user.email "noreply@deepgram.com"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Run agent (fix and review only)
        uses: anthropics/claude-code-action@beta
        env:
          KAPA_API_KEY: ${{ secrets.KAPA_API_KEY }}
          KAPA_PROJECT_ID: 1908afc6-c134-4c6f-a684-ed7d8ce91759
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          VONAGE_APPLICATION_ID: ${{ secrets.VONAGE_APPLICATION_ID }}
          VONAGE_PRIVATE_KEY: ${{ secrets.VONAGE_PRIVATE_KEY }}
          DAILY_API_KEY: ${{ secrets.DAILY_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          model: claude-opus-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
          direct_prompt: |
            Read and execute `instructions/process-open-prs.md`.

            Phase 1 (native CI) already ran tests on every open PR. Results:
            ${{ needs.test-prs.outputs.results }}

            Format: "PR_NUMBER:STATUS" where STATUS is:
              PASS          — tests passed; review this PR and apply status:review-passed if good
              FAIL          — tests failed; fix the code
              MISSING_CREDS — needs repository secrets; leave open, do nothing
              SKIP          — branch unavailable; skip

            YOUR JOB: fix failing PRs and review passing PRs.
            DO NOT MERGE ANYTHING. Merging is handled by a separate workflow step
            after you finish. You cannot and should not merge PRs.

            Today's date: ${{ steps.date.outputs.date }}
            Repository: ${{ github.repository }}
            Run ID: ${{ github.run_id }}

  # ── Phase 3: Merge — native shell, hard gate, no LLM involved ─────────────
  merge:
    needs: [test-prs, agent]
    if: needs.test-prs.outputs.has_prs == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Merge PRs that passed all gates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULTS: ${{ needs.test-prs.outputs.results }}
        run: |
          echo "Test results from Phase 1: $RESULTS"
          MERGED=0

          for entry in $RESULTS; do
            PR_NUM=$(echo "$entry" | cut -d: -f1)
            STATUS=$(echo "$entry" | cut -d: -f2)

            echo ""
            echo "── PR #$PR_NUM (Phase 1 status: $STATUS) ──"

            # Hard gate 1: tests must have passed
            if [ "$STATUS" != "PASS" ]; then
              echo "  Skipping — status is $STATUS, not PASS"
              continue
            fi

            # Hard gate 2: must have review-passed label
            LABELS=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} \
              --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null)
            echo "  Labels: $LABELS"

            if ! echo "$LABELS" | grep -q "status:review-passed"; then
              echo "  Skipping — missing status:review-passed label"
              continue
            fi

            # Hard gate 3: must not have any blocking labels
            if echo "$LABELS" | grep -qE "status:fix-needed|status:needs-credentials"; then
              echo "  Skipping — has blocking label"
              continue
            fi

            # Hard gate 4: PR must still be open
            PR_STATE=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} \
              --json state --jq '.state' 2>/dev/null)
            if [ "$PR_STATE" != "OPEN" ]; then
              echo "  Skipping — PR state is $PR_STATE"
              continue
            fi

            echo "  ✓ All gates passed — merging PR #$PR_NUM"
            gh pr merge "$PR_NUM" \
              --repo ${{ github.repository }} \
              --squash \
              --delete-branch \
              --subject "$(gh pr view $PR_NUM --repo ${{ github.repository }} --json title --jq '.title')" \
            && MERGED=$((MERGED + 1)) || echo "  Merge failed for PR #$PR_NUM"
          done

          echo ""
          echo "Merged $MERGED PR(s) this run."
