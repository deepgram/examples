<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepgram Live Transcription</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 1rem; }
        #status { margin-bottom: 1rem; color: #666; }
        #transcript { border: 1px solid #ccc; border-radius: 4px; padding: 1rem; min-height: 200px;
                       white-space: pre-wrap; font-size: 1.1rem; line-height: 1.5; }
        button { padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; border: none;
                 border-radius: 4px; color: #fff; margin-right: 0.5rem; }
        #startBtn { background: #13ef93; color: #000; }
        #stopBtn  { background: #e74c3c; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .controls { margin-bottom: 1rem; }
        .interim { color: #999; }
    </style>
</head>
<body>
    <h1>Deepgram Live Transcription</h1>
    <div class="controls">
        <button id="startBtn">Start</button>
        <button id="stopBtn" disabled>Stop</button>
    </div>
    <div id="status">Click Start and allow microphone access.</div>
    <div id="transcript"></div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusEl = document.getElementById('status');
        const transcriptEl = document.getElementById('transcript');

        let ws, mediaStream, audioCtx, processor;

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            stopBtn.disabled = false;
            transcriptEl.textContent = '';
            statusEl.textContent = 'Requesting microphone…';

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                statusEl.textContent = 'Microphone access denied.';
                startBtn.disabled = false;
                stopBtn.disabled = true;
                return;
            }

            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${protocol}://${location.host}/ws/transcribe`);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                statusEl.textContent = 'Connected — speak into your microphone.';

                audioCtx = new AudioContext({ sampleRate: 16000 });
                const source = audioCtx.createMediaStreamSource(mediaStream);

                // ScriptProcessorNode sends raw PCM to the server
                processor = audioCtx.createScriptProcessor(4096, 1, 1);
                processor.onaudioprocess = (e) => {
                    if (ws.readyState !== WebSocket.OPEN) return;
                    const float32 = e.inputBuffer.getChannelData(0);
                    const int16 = new Int16Array(float32.length);
                    for (let i = 0; i < float32.length; i++) {
                        int16[i] = Math.max(-32768, Math.min(32767, Math.round(float32[i] * 32767)));
                    }
                    ws.send(int16.buffer);
                };
                source.connect(processor);
                processor.connect(audioCtx.destination);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.error) {
                    statusEl.textContent = 'Error: ' + data.error;
                    return;
                }
                if (data.is_final) {
                    transcriptEl.textContent += data.transcript + '\n';
                }
            };

            ws.onclose = () => {
                statusEl.textContent = 'Disconnected.';
                cleanup();
            };

            ws.onerror = () => {
                statusEl.textContent = 'WebSocket error.';
                cleanup();
            };
        });

        stopBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) ws.close();
            cleanup();
            statusEl.textContent = 'Stopped.';
        });

        function cleanup() {
            startBtn.disabled = false;
            stopBtn.disabled = true;
            if (processor) { processor.disconnect(); processor = null; }
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        }
    </script>
</body>
</html>
