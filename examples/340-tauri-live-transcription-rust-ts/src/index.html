<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deepgram Live Transcription</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f14;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 24px;
    }

    #transcript-container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px 24px;
      width: 100%;
      max-width: 640px;
      min-height: 200px;
      flex: 1;
      overflow-y: auto;
    }

    #transcript {
      font-size: 18px;
      line-height: 1.6;
      color: #ffffff;
    }

    #transcript .interim {
      color: rgba(255, 255, 255, 0.4);
    }

    #controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      align-items: center;
    }

    button {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    button:hover:not(:disabled) { background: rgba(255, 255, 255, 0.18); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    button.active { background: rgba(19, 239, 147, 0.25); border-color: #13ef93; }

    .status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      margin-left: 8px;
    }

    .status.connected { color: #13ef93; }
    .status.error { color: #ff6b6b; }
    .status.disconnected { color: rgba(255, 255, 255, 0.35); }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <h1>Deepgram Live Transcription</h1>
  </div>
  <p class="subtitle">Tauri + Rust + Deepgram Nova-3</p>

  <div id="transcript-container">
    <div id="transcript">Click Start to begin transcription...</div>
  </div>

  <div id="controls">
    <button id="btn-start">Start</button>
    <button id="btn-stop" disabled>Stop</button>
    <span id="status" class="status">disconnected</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
